<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAYLO | Premium Minecraft Accounts</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-color: #00ff88; 
            --border-color: #333;
            --font-heading: 'Orbitron', sans-serif;
            --font-body: 'Roboto', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        header {
            background-color: rgba(5, 5, 5, 0.95);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 0;
            backdrop-filter: blur(5px);
        }

        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 700; color: var(--accent-color); letter-spacing: 2px; text-decoration: none; }
        
        .btn-login {
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            background: transparent;
            padding: 8px 20px;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }

        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .hero h1 { font-family: var(--font-heading); font-size: 3.5rem; margin-bottom: 10px; }
        .hero h1 span { color: var(--accent-color); }
        .hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin-bottom: 30px; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px 0; }
        .product-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            padding: 30px; 
            border-radius: 12px; 
            text-align: center;
            transition: 0.3s ease;
        }
        .product-card:hover { border-color: var(--accent-color); transform: translateY(-5px); }
        .product-card i { color: var(--accent-color); margin-bottom: 15px; }
        .price { color: var(--accent-color); font-weight: 700; font-size: 1.4rem; display: block; margin-top: 10px;}

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none; 
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        
        .auth-box {
            background: #0a0a0a;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .provider-btn {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .google-btn { background: #fff; color: #000; }

        footer { text-align: center; padding: 60px 0; border-top: 1px solid var(--border-color); color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <nav>
                <a href="#" class="logo">VAYLO</a>
                <button class="btn-login" id="auth-nav-btn" onclick="toggleModal()">Sign In</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>VAYLO <span>PREMIUM</span></h1>
            <p>Secure, instant delivery and full warranty on all accounts.</p>
        </section>

        <div class="products-grid">
            <div class="product-card">
                <i class="fas fa-shield-alt fa-3x"></i>
                <h3>Full Access Account</h3>
                <span class="price">$14.99</span>
            </div>
            <div class="product-card">
                <i class="fas fa-crown fa-3x"></i>
                <h3>Hypixel MVP+ Rank</h3>
                <span class="price">$24.99</span>
            </div>
            <div class="product-card">
                <i class="fas fa-scroll fa-3x"></i>
                <h3>Minecon Cape</h3>
                <span class="price">$120.00</span>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="auth-modal">
        <div class="auth-box">
            <h2 style="font-family: var(--font-heading); margin-bottom: 20px; color: var(--accent-color);">Sign In</h2>
            <button class="provider-btn google-btn" onclick="login('Google')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18"> Continue with Google
            </button>
            <button style="background:none; border:none; color:var(--text-muted); margin-top:20px; cursor:pointer;" onclick="toggleModal()">Close</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 VAYLO. Not affiliated with Mojang AB.</p>
    </footer>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyC57HCyd2pFCcKwnb-y0RZP25gFFdTf6QA",
            authDomain: "vaylo-da515.firebaseapp.com",
            projectId: "vaylo-da515",
            storageBucket: "vaylo-da515.firebasestorage.app",
            messagingSenderId: "756940721209",
            appId: "1:756940721209:web:3596ec33e252984c4811e8",
            measurementId: "G-8C77M7ZS3D"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function toggleModal() {
            document.getElementById('auth-modal').classList.toggle('active');
        }

        function login(providerName) {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(() => toggleModal())
                .catch((error) => alert(error.message));
        }

        auth.onAuthStateChanged((user) => {
            const btn = document.getElementById('auth-nav-btn');
            if (user) {
                btn.innerHTML = `<i class="fas fa-user-circle"></i> ${user.displayName.split(' ')[0]}`;
            } else {
                btn.innerHTML = "Sign In";
            }
        });
    </script>
</body>
</html>
